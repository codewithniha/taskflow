{% extends 'base.html' %}
{% block title %}New Task – TaskFlow{% endblock %}
{% block content %}
<div class="container" style="max-width:600px;">
  <div class="page-header">
    <h1 class="page-title">New Task</h1>
    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">← Back</a>
  </div>
  <div class="card">
    {% if error %}
      <div class="alert-error" id="error-message">{{ error }}</div>
    {% endif %}
    <form method="POST" id="add-task-form">
      <div class="form-group">
        <label for="title">Task Title *</label>
        <input type="text" id="title" name="title" placeholder="What needs to be done?" required/>
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" placeholder="Optional details…"></textarea>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
        <div class="form-group">
          <label for="priority">Priority</label>
          <select id="priority" name="priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div class="form-group">
          <label for="due_date">Due Date</label>
          <input type="date" id="due_date" name="due_date"/>
        </div>
      </div>
      <div style="display:flex; gap:1rem; margin-top:.5rem;">
        <button type="submit" class="btn btn-primary" id="submit-task-btn">Create Task</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
