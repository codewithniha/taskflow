{% extends 'base.html' %}
{% block title %}Profile – TaskFlow{% endblock %}
{% block content %}
<div class="container" style="max-width:560px;">
  <div class="page-header">
    <h1 class="page-title">Profile</h1>
  </div>
  <div class="card">
    <div style="margin-bottom:1.5rem; padding-bottom:1.25rem; border-bottom:1px solid var(--border);">
      <div style="font-size:.8rem; color:var(--muted); font-family:'DM Mono',monospace;">USERNAME</div>
      <div style="font-size:1.1rem; font-weight:600; margin-top:.3rem;" id="profile-username">
        {{ current_user.username }}
      </div>
    </div>
    {% if error %}
      <div class="alert-error" id="error-message">{{ error }}</div>
    {% endif %}
    {% if success %}
      <div class="flash flash-success" id="success-message">{{ success }}</div>
    {% endif %}
    <form method="POST" id="profile-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ current_user.email }}" required/>
      </div>
      <div class="form-group">
        <label for="new_password">New Password <span style="color:var(--muted)">(leave blank to keep current)</span></label>
        <input type="password" id="new_password" name="new_password" placeholder="New password"/>
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm New Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm new password"/>
      </div>
      <button type="submit" class="btn btn-primary" id="update-profile-btn">Update Profile</button>
    </form>
  </div>
</div>
{% endblock %}
