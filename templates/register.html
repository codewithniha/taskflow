{% extends 'base.html' %}
{% block title %}Register – TaskFlow{% endblock %}
{% block content %}
<div style="display:flex; justify-content:center; align-items:center; min-height:calc(100vh - 60px);">
  <div style="width:100%; max-width:440px; padding:1.5rem;">
    <div style="text-align:center; margin-bottom:2rem;">
      <h1 style="font-size:1.6rem; font-weight:800;">Create Account</h1>
      <p style="color:var(--muted); font-size:.9rem; margin-top:.4rem;">Join TaskFlow today</p>
    </div>
    <div class="card">
      {% if error %}
        <div class="alert-error" id="error-message">{{ error }}</div>
      {% endif %}
      <form method="POST" id="register-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="At least 3 characters" required/>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Password" required/>
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirm Password</label>
          <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required/>
        </div>
        <button type="submit" class="btn btn-primary" id="register-btn" style="width:100%; margin-top:.5rem;">
          Create Account
        </button>
      </form>
      <p style="text-align:center; margin-top:1.25rem; font-size:.88rem; color:var(--muted);">
        Have an account? <a href="{{ url_for('login') }}" id="login-link">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
