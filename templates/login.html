{% extends 'base.html' %}
{% block title %}Login – TaskFlow{% endblock %}
{% block content %}
<div style="display:flex; justify-content:center; align-items:center; min-height:calc(100vh - 60px);">
  <div style="width:100%; max-width:420px; padding:1.5rem;">
    <div style="text-align:center; margin-bottom:2rem;">
      <div style="font-size:2.5rem;">⬡</div>
      <h1 style="font-size:1.8rem; font-weight:800; color:var(--accent);">TaskFlow</h1>
      <p style="color:var(--muted); font-size:.9rem; margin-top:.4rem;">Sign in to your workspace</p>
    </div>
    <div class="card">
      {% if error %}
        <div class="alert-error" id="error-message">{{ error }}</div>
      {% endif %}
      <form method="POST" id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter username" required/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" required/>
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn" style="width:100%; margin-top:.5rem;">
          Sign In
        </button>
      </form>
      <p style="text-align:center; margin-top:1.25rem; font-size:.88rem; color:var(--muted);">
        No account? <a href="{{ url_for('register') }}" id="register-link">Register here</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
